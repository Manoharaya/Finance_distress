services:
  backend:
    build: ./backend
    container_name: distress_backend
    volumes:
      - ./backend:/app
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    restart: always

  worker:
    build: ./backend
    container_name: distress_worker
    command: celery -A app.core.celery_app worker --loglevel=info -P solo
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    depends_on:
      - backend
    restart: always

  frontend:
    build: ./frontend
    container_name: distress_frontend
    ports:
      - "3010:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=https://demo.codexneural.com
    depends_on:
      - backend
    restart: always

  caddy:
    image: caddy:latest
    container_name: distress_caddy
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data:
  caddy_config:
